<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Coordination Test - Rotary & Tracks</title>
    <style>
        :root {
            --bg: #222; /* Darker outer bg */
            --track-bg: #00008B; /* Solid Dark Blue */
            --surface: #ffffff;
            --primary: #3b82f6;
            --error: #FF0000;
            --car: #808080; /* Grey metallic */
            --text: #333;
            --knob-bg: #d1d5db;
            --knob-stroke: #4b5563;
        }

        /* Prevent default touch behaviors entirely */
        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* Error Red Flash Overlay */
        #flashOverlay {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(255, 0, 0, 0.4);
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }
        #flashOverlay.flash {
            opacity: 1;
            transition: none;
        }

        /* UI Overlay */
        #topBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 100;
            width: 90%;
            max-width: 600px;
            pointer-events: auto;
        }

        .score-board {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 8px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .level-select {
            margin-top: 4px;
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
            padding: 2px 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #f9fafb;
            color: var(--text);
            outline: none;
        }

        .stat-label {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 24px;
            font-family: monospace;
            font-weight: bold;
            color: var(--text);
        }

        .error-value {
            color: var(--error);
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
        }

        .btn {
            flex: 1;
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
            padding: 12px 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, filter 0.1s, background-color 0.2s, box-shadow 0.2s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        .btn:active {
            transform: scale(0.96);
            filter: brightness(0.85);
        }

        .btn-start { background-color: #166534; } 
        .btn-stop { background-color: #7f1d1d; } 
        .btn-reset { background-color: #4b5563; }

        .btn-start.active { background-color: #22c55e; box-shadow: 0 0 15px #22c55e; }
        .btn-stop.active { background-color: #ef4444; box-shadow: 0 0 15px #ef4444; }

        /* Game Layout Flexbox */
        #gameArea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top 60% = Track Canvas (Dark Blue Background) */
        #simCanvas {
            width: 100%;
            height: 60%;
            z-index: 1;
            background-color: var(--track-bg); /* Enforce solid dark blue fallback */
            border-bottom: 4px solid var(--surface);
            box-sizing: border-box;
            touch-action: none; 
            pointer-events: none; /* Let knobs handle input below */
        }
        
        /* Bottom 40% = Rotary Knobs Canvas */
        #knobCanvas {
            width: 100%;
            height: 40%;
            z-index: 10;
            background-color: var(--bg);
            touch-action: none;
        }
        
    </style>
</head>
<body>

    <div id="topBar">
        <div class="score-board">
            <div class="stat-group">
                <span class="stat-label">Level</span>
                <select id="levelSelect" class="level-select">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
            </div>
            <div class="stat-group">
                <span class="stat-label">Timer</span>
                <span class="stat-value" id="timeVal">00:00</span>
            </div>
            <div class="stat-group">
                <span class="stat-label">Errors</span>
                <span class="stat-value error-value" id="errorVal">0</span>
            </div>
        </div>
        
        <div class="control-buttons">
            <button id="startBtn" class="btn btn-start">Start</button>
            <button id="stopBtn" class="btn btn-stop active">Stop</button>
            <button id="resetBtn" class="btn btn-reset">Reset</button>
        </div>
    </div>

    <!-- Red Flash Overlay -->
    <div id="flashOverlay"></div>

    <div id="gameArea">
        <!-- 60% Track -->
        <canvas id="simCanvas"></canvas>
        <!-- 40% Knobs -->
        <canvas id="knobCanvas"></canvas>
    </div>

<script>
    const trackCanvas = document.getElementById('simCanvas');
    const trackCtx = trackCanvas.getContext('2d');
    
    const knobCanvas = document.getElementById('knobCanvas');
    const knobCtx = knobCanvas.getContext('2d');
    
    const levelSelect = document.getElementById('levelSelect');
    const timeVal = document.getElementById('timeVal');
    const errorVal = document.getElementById('errorVal');
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const resetBtn = document.getElementById('resetBtn');

    // EXPLICIT GAME STATE
    let isPaused = true; 
    let timer = 0;
    let errors = 0;
    let level = 1;
    let lastTime = 0;
    
    // Engine Constants
    let playerBaseY = 0;
    let leftTrackBaseX = 0;
    let rightTrackBaseX = 0;
    const config = {
        playerMaxSpeed: 300,       
        playerFriction: 0.88,      
        rotarySensitivity: 6.0,    // Multiplier for sliding distance
        trackStartWidth: 120,      
        trackMinWidth: 70,         
        narrowingRate: 0.15,        
        scrollSpeed: 16.0,         
        carRadius: 15,
        
        // Knob Graphic Specs
        knobRadius: 0 // Calculated dynamically
    };

    // Actors (Cars)
    const carLeft = { x: 0, y: 0, vx: 0, isOutOfBounds: false, wasOutOfBounds: false };
    const carRight = { x: 0, y: 0, vx: 0, isOutOfBounds: false, wasOutOfBounds: false };

    // Actors (Knobs - Angles in Radians)
    const knobLeft = { angle: 0, x: 0, y: 0 };
    const knobRight = { angle: 0, x: 0, y: 0 };

    // Rotary Input State
    const activePointers = {}; 

    // --- AUDIO SYSTEM ---
    let audioCtx = null;
    function playErrorBeep() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'square'; 
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);

        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.1);
    }

    // --- GEOMETRY SETUP ---
    function resizeCanvas() {
        trackCanvas.width = trackCanvas.clientWidth;
        trackCanvas.height = trackCanvas.clientHeight;
        
        knobCanvas.width = knobCanvas.clientWidth;
        knobCanvas.height = knobCanvas.clientHeight;
        
        leftTrackBaseX = trackCanvas.width * 0.25;
        rightTrackBaseX = trackCanvas.width * 0.75;
        
        // Target: "Cars must be perfectly centered at the top of the white tracks"
        // Dynamically measure the topBar height so cars spawn VISIBLY just below the physical UI layer
        const topBarHeight = document.getElementById('topBar').offsetHeight || 120;
        playerBaseY = topBarHeight + 35; 
        
        // Knob positioning
        config.knobRadius = Math.min(knobCanvas.width * 0.2, knobCanvas.height * 0.4);
        knobLeft.x = knobCanvas.width * 0.25;
        knobLeft.y = knobCanvas.height * 0.5;
        knobRight.x = knobCanvas.width * 0.75;
        knobRight.y = knobCanvas.height * 0.5;

        // Secure initial positioning explicitly aligned with the dead-center of the tracks
        if (carLeft.x === 0 || isPaused) {
            const trackVerticalTimePos = timer * ((config.scrollSpeed * Math.pow(1.15, level - 1)) / 10);
            carLeft.x = leftTrackBaseX + getLeftTrackOffset(trackVerticalTimePos);
            carRight.x = rightTrackBaseX + getRightTrackOffset(trackVerticalTimePos);
            carLeft.y = playerBaseY;
            carRight.y = playerBaseY;
        }

        drawAllStatic();
    }
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 150));

    // --- UNIFIED POINTER SLIDING ON KNOB CANVAS ---
    knobCanvas.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        const rect = knobCanvas.getBoundingClientRect();
        const clientX = e.clientX - rect.left;
        
        const side = clientX < knobCanvas.width / 2 ? 'left' : 'right';
        
        activePointers[e.pointerId] = {
            side: side,
            startX: clientX,
            lastX: clientX,
            active: true
        };
        knobCanvas.setPointerCapture(e.pointerId);
    });

    knobCanvas.addEventListener('pointermove', (e) => {
        e.preventDefault();
        const ptr = activePointers[e.pointerId];
        if (!ptr || !ptr.active) return;
        
        const rect = knobCanvas.getBoundingClientRect();
        const clientX = e.clientX - rect.left;
        
        const deltaX = clientX - ptr.lastX;
        if (deltaX === 0) return;
        
        // physics rotation factor
        const impartedVelocity = deltaX * config.rotarySensitivity;
        const rotationFactor = deltaX * 0.05; 

        if (ptr.side === 'left') {
            carLeft.vx += impartedVelocity;
            knobLeft.angle += rotationFactor;
        } else {
            carRight.vx += impartedVelocity;
            knobRight.angle += rotationFactor;
        }

        ptr.lastX = clientX;
    });

    knobCanvas.addEventListener('pointerup', endPointer);
    knobCanvas.addEventListener('pointercancel', endPointer);

    function endPointer(e) {
        e.preventDefault();
        if (activePointers[e.pointerId]) {
            activePointers[e.pointerId].active = false;
            delete activePointers[e.pointerId];
        }
        knobCanvas.releasePointerCapture(e.pointerId);
    }

    // Disable standard touch-move behaviors globally completely
    document.addEventListener('touchstart', (e) => {
        if(e.target.tagName !== 'BUTTON' && e.target.tagName !== 'SELECT') e.preventDefault();
    }, {passive: false});
    document.addEventListener('touchmove', (e) => e.preventDefault(), {passive: false});

    // --- TRACK GENERATION ---
    // Increased velocity/curve level multiplier to 1.25 so difficulty select is extremely prominent
    function getLeftTrackOffset(timeSecs) {
        const t = timeSecs * Math.pow(1.25, level - 1);
        return Math.sin(t * 0.15) * (trackCanvas.width * 0.08) 
             + Math.sin(t * 0.3 + 2) * (trackCanvas.width * 0.06)
             + Math.cos(t * 0.4) * (trackCanvas.width * 0.03);
    }

    function getRightTrackOffset(timeSecs) {
        const t = timeSecs * Math.pow(1.25, level - 1);
        return Math.sin(t * 0.12 + 5) * (trackCanvas.width * 0.09) 
             + Math.cos(t * 0.25 + 1) * (trackCanvas.width * 0.05)
             + Math.sin(t * 0.45) * (trackCanvas.width * 0.03);
    }

    // --- LEVEL SELECTOR AND BUTTON LOGIC ---
    levelSelect.addEventListener('change', (e) => {
        level = parseInt(e.target.value);
        resetBtn.click(); // Changing level forces a full reset just like PC
    });

    startBtn.addEventListener('click', () => {
        isPaused = false;
        startBtn.classList.add('active'); 
        stopBtn.classList.remove('active'); 
        lastTime = performance.now();
        
        // Boot audio context on intentional user interaction if needed
        if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        
        requestAnimationFrame(gameLoop);
    });

    stopBtn.addEventListener('click', () => {
        isPaused = true;                
        stopBtn.classList.add('active');  
        startBtn.classList.remove('active'); 
        carLeft.vx = 0;
        carRight.vx = 0;
        drawAllStatic();
    });

    resetBtn.addEventListener('click', () => {
        isPaused = true;
        stopBtn.classList.add('active');
        startBtn.classList.remove('active');
        
        timer = 0;
        errors = 0;
        
        // If the selector was manually changed, persist that level, else standard reset logic
        level = parseInt(levelSelect.value);

        // Snap perfectly centered to the 0.0 top base of the tracks
        carLeft.x = leftTrackBaseX + getLeftTrackOffset(0);
        carRight.x = rightTrackBaseX + getRightTrackOffset(0);
        carLeft.y = playerBaseY;
        carRight.y = playerBaseY;
        carLeft.vx = 0;
        carRight.vx = 0;
        carLeft.isOutOfBounds = false;
        carLeft.wasOutOfBounds = false;
        carRight.isOutOfBounds = false;
        carRight.wasOutOfBounds = false;
        
        // Zero knob visual rotations
        knobLeft.angle = 0;
        knobRight.angle = 0;

        timeVal.innerText = '00:00';
        errorVal.innerText = '0';

        // Clear input queue
        for (let pointerId in activePointers) delete activePointers[pointerId];

        drawAllStatic();
    });

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = Math.floor(seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    // --- MAIN GAME LOOP ---
    function gameLoop(now) {
        if (isPaused) return; 

        let dt = (now - lastTime) / 1000;
        if(dt > 0.1) dt = 0.016; 
        lastTime = now;
        
        timer += dt;

        let newLevel = Math.floor(timer / 30) + 1;
        if (newLevel > level && newLevel <= 10) {
            level = newLevel;
            levelSelect.value = level.toString();
        }

        // --- CAR PHYSICS ---
        carLeft.vx *= config.playerFriction;
        carLeft.vx = Math.max(-config.playerMaxSpeed, Math.min(config.playerMaxSpeed, carLeft.vx));
        carLeft.x += carLeft.vx * dt;

        carRight.vx *= config.playerFriction;
        carRight.vx = Math.max(-config.playerMaxSpeed, Math.min(config.playerMaxSpeed, carRight.vx));
        carRight.x += carRight.vx * dt;

        // Force Constraints 
        const midPoint = trackCanvas.width / 2;
        if (carLeft.x < config.carRadius) { carLeft.x = config.carRadius; carLeft.vx = 0; }
        if (carLeft.x > midPoint - config.carRadius) { carLeft.x = midPoint - config.carRadius; carLeft.vx = 0; }
        
        if (carRight.x < midPoint + config.carRadius) { carRight.x = midPoint + config.carRadius; carRight.vx = 0; }
        if (carRight.x > trackCanvas.width - config.carRadius) { carRight.x = trackCanvas.width - config.carRadius; carRight.vx = 0; }

        // Evaluation Logics
        const speedMult = Math.pow(1.15, level - 1);
        const trackVerticalTimePos = timer * ((config.scrollSpeed * speedMult) / 10); 
        const idealWidth = Math.max(config.trackMinWidth, config.trackStartWidth - (timer * config.narrowingRate));

        const lxCenter = leftTrackBaseX + getLeftTrackOffset(trackVerticalTimePos);
        const rxCenter = rightTrackBaseX + getRightTrackOffset(trackVerticalTimePos);
        const halfWidth = idealWidth / 2;
        
        carLeft.isOutOfBounds = Math.abs(carLeft.x - lxCenter) + config.carRadius > halfWidth;
        carRight.isOutOfBounds = Math.abs(carRight.x - rxCenter) + config.carRadius > halfWidth;

        // Trigger Red Flash & Error Beep
        if ((carLeft.isOutOfBounds && !carLeft.wasOutOfBounds) || 
            (carRight.isOutOfBounds && !carRight.wasOutOfBounds)) {
            
            errors++;
            
            // Opaque canvases block body colors, so we trigger a physical overlay div to flash red instantly
            const overlay = document.getElementById('flashOverlay');
            overlay.classList.remove('flash');
            void overlay.offsetWidth; // Hard reflow to replay CSS anim
            overlay.classList.add('flash');
            
            setTimeout(() => overlay.classList.remove('flash'), 50);

            try { playErrorBeep(); } catch(e) {}
        }

        carLeft.wasOutOfBounds = carLeft.isOutOfBounds;
        carRight.wasOutOfBounds = carRight.isOutOfBounds;
        
        // Exact Y-position locks
        carLeft.y = playerBaseY;
        carRight.y = playerBaseY;

        drawAllStatic();

        timeVal.innerText = formatTime(timer);
        errorVal.innerText = errors;

        requestAnimationFrame(gameLoop);
    }

    function drawAllStatic() {
        drawTrackArea();
        drawKnobArea();
    }

    // --- 1. TRACK AREA RENDER ---
    function drawTrackArea() {
        trackCtx.clearRect(0,0, trackCanvas.width, trackCanvas.height);
        
        // REQUIREMENT 2: Solid Dark Blue (#00008b) Background
        trackCtx.fillStyle = '#00008b'; 
        trackCtx.fillRect(0, 0, trackCanvas.width, trackCanvas.height);

        const speedMult = Math.pow(1.15, level - 1);
        const trackVerticalTimePos = timer * ((config.scrollSpeed * speedMult) / 10);
        const idealWidth = Math.max(config.trackMinWidth, config.trackStartWidth - (timer * config.narrowingRate));

        drawTrack(leftTrackBaseX, getLeftTrackOffset, idealWidth, trackVerticalTimePos);
        drawTrack(rightTrackBaseX, getRightTrackOffset, idealWidth, trackVerticalTimePos);

        drawVehicle(carLeft);
        drawVehicle(carRight);
    }

    function drawTrack(baseX, offsetFunc, baseWidth, baseTimePos) {
        trackCtx.beginPath();
        const ptsLeft = [], ptsRight = [];
        const lookaheadScale = 0.08; 
        
        // NOTE ON VISIBILITY: Loop deep enough to ensure solid path cover
        for (let y = -20; y <= trackCanvas.height + 20; y += 15) { 
            const dy = playerBaseY - y;
            const timeSample = baseTimePos + (dy * lookaheadScale);
            const cx = baseX + offsetFunc(timeSample);
            const wl = (baseWidth / 2);
            const wr = (baseWidth / 2);

            ptsLeft.push({ x: cx - wl, y: y });
            ptsRight.push({ x: cx + wr, y: y });
        }

        if (ptsLeft.length === 0) return;

        // REQUIREMENT 2/6: Explicit ctx.fill() for white paths
        trackCtx.fillStyle = '#FFFFFF';
        trackCtx.beginPath();
        trackCtx.moveTo(ptsLeft[0].x, ptsLeft[0].y);
        for(let i=1; i<ptsLeft.length; i++) trackCtx.lineTo(ptsLeft[i].x, ptsLeft[i].y);
        for(let i=ptsRight.length-1; i>=0; i--) trackCtx.lineTo(ptsRight[i].x, ptsRight[i].y);
        trackCtx.closePath();
        trackCtx.fill();
    }

    // REQUIREMENT 1/3: Visible Dark Metallic Grey with Black Borders
    function drawVehicle(car) {
        const isError = car.isOutOfBounds;
        trackCtx.fillStyle = isError ? '#FF0000' : '#6b7280'; // Explicit Grey Metallic '#6b7280', Red on fail
        trackCtx.beginPath();
        trackCtx.arc(car.x, car.y, config.carRadius, 0, Math.PI * 2);
        trackCtx.fill();
        trackCtx.strokeStyle = '#000000'; // Black border
        trackCtx.lineWidth = 3;
        trackCtx.stroke();
    }

    // --- 2. KNOB AREA RENDER ---
    // REQUIREMENT 1: Re-implemented rotary knobs perfect rendering
    function drawKnobArea() {
        knobCtx.clearRect(0,0, knobCanvas.width, knobCanvas.height);
        
        // Background of lower section
        knobCtx.fillStyle = 'var(--bg)';
        knobCtx.fillRect(0, 0, knobCanvas.width, knobCanvas.height);

        // Draw Left Knob
        renderRotaryKnob(knobLeft.x, knobLeft.y, knobLeft.angle, "L");
        
        // Draw Right Knob
        renderRotaryKnob(knobRight.x, knobRight.y, knobRight.angle, "R");
    }

    function renderRotaryKnob(x, y, angle, label) {
        const r = config.knobRadius;
        
        // 1. Outer Ring Base (Grey Circular Knob)
        knobCtx.beginPath();
        knobCtx.arc(x, y, r, 0, Math.PI*2);
        knobCtx.fillStyle = 'var(--knob-bg)';
        knobCtx.fill();
        knobCtx.lineWidth = 6;
        knobCtx.strokeStyle = 'var(--knob-stroke)';
        knobCtx.stroke();

        // 2. Inner Dial Graphic
        knobCtx.beginPath();
        knobCtx.arc(x, y, r * 0.7, 0, Math.PI*2);
        knobCtx.fillStyle = '#e5e7eb';
        knobCtx.fill();
        knobCtx.lineWidth = 2;
        knobCtx.strokeStyle = '#9ca3af';
        knobCtx.stroke();
        
        // 3. Label (L / R)
        knobCtx.fillStyle = 'rgba(0,0,0,0.2)';
        knobCtx.font = "bold 30px sans-serif";
        knobCtx.textAlign = "center";
        knobCtx.textBaseline = "middle";
        knobCtx.fillText(label, x, y);

        // 4. Indicator Point (Shows horizontal sliding rotation)
        knobCtx.save();
        knobCtx.translate(x, y);
        knobCtx.rotate(angle);
        
        knobCtx.beginPath();
        // The Indicator Dot
        knobCtx.arc(0, -r * 0.85, r * 0.15, 0, Math.PI*2);
        knobCtx.fillStyle = '#1f2937';
        knobCtx.fill();
        // The Indicator Line
        knobCtx.beginPath();
        knobCtx.moveTo(0, 0);
        knobCtx.lineTo(0, -r * 0.7);
        knobCtx.strokeStyle = '#1f2937';
        knobCtx.lineWidth = 4;
        knobCtx.stroke();
        
        knobCtx.restore();
    }
    
    // Explicit Boot
    resizeCanvas();
    resetBtn.click(); // Initial explicit software click to guarantee completely clean reset

</script>
</body>
</html>
