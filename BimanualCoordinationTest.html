<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Coordinación Bimanual</title>
    <style>
        :root {
            --bg: #00008B;
            --surface: #ffffff;
            --primary: #3b82f6;
            --error: #FF0000;
            --car: #666666;
            /* Dark metallic grey */
            --text: #333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            /* Darker outer bg to pop the blue canvas */
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #topBar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 5;
        }

        .score-board {
            background-color: var(--surface);
            border-radius: 12px;
            padding: 10px 40px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 40px;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 14px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 32px;
            font-family: monospace;
            font-weight: bold;
            color: var(--text);
        }

        .error-value {
            color: var(--error);
        }

        .control-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-stop {
            background-color: #ef4444;
        }

        .btn-stop:hover {
            background-color: #dc2626;
        }

        .btn-reset {
            background-color: #6b7280;
        }

        .btn-reset:hover {
            background-color: #4b5563;
        }

        #canvasWrapper {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: var(--bg);
            margin-top: 150px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            border: 4px solid var(--surface);
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 139, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .instructions {
            color: #e5e7eb;
            line-height: 1.6;
            text-align: center;
            max-width: 450px;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .keys-info {
            display: flex;
            gap: 50px;
            margin-bottom: 40px;
            color: white;
        }

        .hand-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .hand-label {
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        kbd {
            background-color: white;
            border-radius: 6px;
            padding: 6px 14px;
            font-family: monospace;
            font-size: 18px;
            color: black;
            font-weight: bold;
            box-shadow: 0 4px 0 #ccc;
        }

        .countdown {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-family: monospace;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.8), 4px 4px 0px rgba(0, 0, 0, 0.3);
            z-index: 20;
            pointer-events: none;
        }

        /* New End Screen Styling */
        #endScreen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            color: white;
            text-align: center;
            padding: 40px;
        }

        #endScreen h1 {
            font-size: 56px;
            margin-bottom: 10px;
            color: #ef4444;
            /* Red color for FIN DEL JUEGO */
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        #endScreen p {
            font-size: 28px;
            margin-bottom: 40px;
        }

        #finalErrors {
            font-weight: bold;
            color: #ef4444;
            font-size: 40px;
        }
    </style>
</head>

<body>

    <div id="topBar">
        <div class="score-board">
            <div class="stat-group">
                <span class="stat-label">NIVEL</span>
                <span class="stat-value" id="levelVal">1</span>
            </div>
            <div class="stat-group">
                <span class="stat-label">TIEMPO</span>
                <span class="stat-value" id="timeVal">00:00</span>
            </div>
            <div class="stat-group">
                <span class="stat-label">ERRORES</span>
                <span class="stat-value error-value" id="errorVal">0</span>
            </div>
        </div>

        <div class="control-buttons">
            <select id="levelSelect" class="btn"
                style="background-color: var(--surface); color: var(--text); border: 2px solid var(--primary); outline: none;">
                <option value="1">Nivel 1</option>
                <option value="2">Nivel 2</option>
                <option value="3">Nivel 3</option>
            </select>
            <button id="startControlBtn" class="btn">INICIAR</button>
            <button id="stopControlBtn" class="btn btn-stop">PARAR</button>
            <button id="resetControlBtn" class="btn btn-reset">REINICIAR</button>
        </div>
    </div>

    <div id="canvasWrapper">
        <canvas id="simCanvas" width="800" height="600"></canvas>

        <div id="countdownDisplay" class="countdown">3</div>

        <div id="overlay">
            <div id="startScreen">
                <h1>Prueba de Coordinación</h1>
                <p class="instructions">
                    Mantén los círculos dentro de los caminos blancos. Los vehículos avanzarán de arriba hacia abajo.
                    Tienes exactamente 60 segundos.
                </p>
                <div class="keys-info">
                    <div class="hand-controls">
                        <span class="hand-label">MANO IZQUIERDA</span>
                        <div><kbd>A</kbd> <kbd>D</kbd></div>
                    </div>
                    <div class="hand-controls">
                        <span class="hand-label">MANO DERECHA</span>
                        <div><kbd>◀</kbd> <kbd>▶</kbd></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="endScreen">
            <h1>FIN DEL JUEGO</h1>
            <p>Errores totales: <span id="finalErrors">0</span></p>
            <button class="btn btn-primary btn-reset" id="endRestartBtn"
                style="font-size: 20px; padding: 12px 24px;">REINICIAR</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // UI Elements
        const levelVal = document.getElementById('levelVal');
        const timeVal = document.getElementById('timeVal');
        const errorVal = document.getElementById('errorVal');
        const levelSelect = document.getElementById('levelSelect');
        const startControlBtn = document.getElementById('startControlBtn');
        const stopControlBtn = document.getElementById('stopControlBtn');
        const resetControlBtn = document.getElementById('resetControlBtn');

        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('startScreen');
        const countdownDisplay = document.getElementById('countdownDisplay');
        const endScreen = document.getElementById('endScreen');
        const endRestartBtn = document.getElementById('endRestartBtn');

        // Core state
        let state = 'IDLE'; // IDLE, COUNTDOWN, RUNNING, ENDED
        let currentLevel = 1;
        let countdownValue = 3;
        let reqId = null;
        let startTime = 0;
        let lastTime = 0;
        let elapsedTime = 0;
        let errors = 0;
        let dt = 0;
        let isScreenFlashing = false;

        // Configuration
        const config = {
            playerMaxSpeed: 160,
            playerAccel: 350,
            playerFriction: 0.85,
            trackWidth: 120,
            leftTrackBaseX: 230,
            rightTrackBaseX: 570,
            baseScrollSpeed: 72, // Level 1 speed reduced by 40% (from 120 to 72)
            carRadius: 22     // Dark metallic grey circles
        };

        // Actors
        const leftDot = { x: 0, y: 0, vx: 0, radius: config.carRadius, isOutOfBounds: false, wasOutOfBounds: false };
        const rightDot = { x: 0, y: 0, vx: 0, radius: config.carRadius, isOutOfBounds: false, wasOutOfBounds: false };

        // Input state
        const keys = { KeyA: false, KeyD: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                if (state === 'RUNNING' && ["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space", "Enter"].indexOf(e.code) > -1) {
                    e.preventDefault();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
            }
        });

        function formatTime(seconds) {
            if (seconds >= 60) return "01:00"; // Exact match at 60s
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        // Dynamic scroll speed based on Level
        function getCurrentScrollSpeed() {
            if (currentLevel === 1) return config.baseScrollSpeed;
            if (currentLevel === 2) return config.baseScrollSpeed * 1.4; // 40% faster
            if (currentLevel === 3) return config.baseScrollSpeed * 1.8; // 80% faster
            return config.baseScrollSpeed;
        }

        // Time/Distance along the track combines elapsed time (scrolling) + screen Y position
        function getTrackTime(screenY, elapsed) {
            // Track scrolls DOWN, so points visually higher on screen are "further" along the track
            // The track origin (t=0) starts at the cars (canvas.height/2) when elapsed=0
            const trackY = (screenY - canvas.height / 2) + elapsed * getCurrentScrollSpeed();
            return trackY * 0.005; // Base frequency scaling
        }

        function getLeftTrackOffset(t) {
            return Math.sin(t) * 50 + Math.sin(t * 2.3 + 2) * 30 + Math.cos(t * 0.7) * 20;
        }

        function getRightTrackOffset(t) {
            return Math.sin(t * 1.2 + 5) * 55 + Math.cos(t * 0.8 + 1) * 35 + Math.sin(t * 2.5) * 15;
        }

        function resetToIdle(keepLevel = false) {
            state = 'IDLE';
            if (reqId) cancelAnimationFrame(reqId);
            reqId = null;

            elapsedTime = 0;
            errors = 0;
            isScreenFlashing = false;

            // Cars FIXED at center Y
            leftDot.y = canvas.height / 2;
            rightDot.y = canvas.height / 2;

            // Position X perfectly centered on the track at initial time (t=0 because screenY=center and elapsed=0)
            const tStart = getTrackTime(canvas.height / 2, 0);
            leftDot.x = config.leftTrackBaseX + getLeftTrackOffset(tStart);
            rightDot.x = config.rightTrackBaseX + getRightTrackOffset(tStart);

            leftDot.vx = 0;
            leftDot.isOutOfBounds = false; leftDot.wasOutOfBounds = false;

            rightDot.vx = 0;
            rightDot.isOutOfBounds = false; rightDot.wasOutOfBounds = false;

            overlay.style.display = 'flex';
            overlay.style.backgroundColor = 'rgba(0, 0, 139, 0.85)';
            startScreen.style.display = 'block';
            countdownDisplay.style.display = 'none';
            endScreen.style.display = 'none';

            timeVal.innerText = '00:00';
            errorVal.innerText = '0';

            if (!keepLevel) {
                currentLevel = 1;
                levelSelect.value = "1";
                levelVal.innerText = "1";
            } else {
                // Read from dropdown if maintaining
                currentLevel = parseInt(levelSelect.value) || currentLevel;
                levelVal.innerText = currentLevel;
            }

            drawFrameStatic();
        }

        function resetSimulation() {
            resetToIdle(false);
        }

        function changeLevel(newLevel) {
            currentLevel = Math.max(1, Math.min(3, newLevel));
            levelSelect.value = currentLevel.toString();
            levelVal.innerText = currentLevel.toString();
            resetToIdle(true);
        }

        function initCountdown() {
            if (state === 'RUNNING' || state === 'COUNTDOWN') return;

            // Reset state while keeping level
            resetToIdle(true);

            state = 'COUNTDOWN';
            countdownValue = 3;

            overlay.style.display = 'block';
            overlay.style.backgroundColor = 'transparent';
            startScreen.style.display = 'none';
            countdownDisplay.style.display = 'block';
            countdownDisplay.innerText = countdownValue;

            lastTime = performance.now();
            drawFrameStatic();
            if (reqId) cancelAnimationFrame(reqId);
            reqId = requestAnimationFrame(loop);
        }

        function startGame() {
            state = 'RUNNING';
            countdownDisplay.style.display = 'none';
            overlay.style.display = 'none';
            startTime = performance.now() - (elapsedTime * 1000);
            lastTime = performance.now();
        }

        function showEndScreen() {
            state = 'ENDED';
            if (reqId) cancelAnimationFrame(reqId);
            reqId = null;

            isScreenFlashing = false;
            drawFrameStatic(); // Draw clean final state

            endScreen.style.display = 'flex';
            document.getElementById('finalErrors').innerText = errors;
        }

        function stopGame() {
            if (state !== 'RUNNING' && state !== 'COUNTDOWN') return;
            showEndScreen();
        }

        // Bind controls
        startControlBtn.addEventListener('click', initCountdown);
        stopControlBtn.addEventListener('click', stopGame);
        resetControlBtn.addEventListener('click', resetSimulation);
        endRestartBtn.addEventListener('click', () => resetToIdle(true));

        levelSelect.addEventListener('change', (e) => {
            changeLevel(parseInt(e.target.value));
        });

        // Main Loop
        function loop(now) {
            dt = (now - lastTime) / 1000;
            if (dt > 0.1) dt = 0.016;
            lastTime = now;

            if (state === 'COUNTDOWN') {
                countdownValue -= dt;
                if (countdownValue > 0) {
                    countdownDisplay.innerText = Math.ceil(countdownValue);
                } else if (countdownValue > -0.5) {
                    countdownDisplay.innerText = '¡YA!';
                } else {
                    startGame();
                }
                reqId = requestAnimationFrame(loop);
                return;
            }

            if (state !== 'RUNNING') return;

            elapsedTime = (now - startTime) / 1000;

            if (elapsedTime >= 60) {
                elapsedTime = 60;
                timeVal.innerText = formatTime(elapsedTime);
                errorVal.innerText = errors;
                showEndScreen();
                return;
            }

            updatePhysics();
            drawFrame();

            timeVal.innerText = formatTime(elapsedTime);
            errorVal.innerText = errors;

            reqId = requestAnimationFrame(loop);
        }

        function updatePhysics() {
            // Cars FIXED Y
            leftDot.y = canvas.height / 2;
            rightDot.y = canvas.height / 2;

            // Left Dot Input X
            if (keys.KeyA) {
                leftDot.vx -= config.playerAccel * dt;
            } else if (keys.KeyD) {
                leftDot.vx += config.playerAccel * dt;
            } else {
                leftDot.vx *= config.playerFriction;
            }
            leftDot.vx = Math.max(-config.playerMaxSpeed, Math.min(config.playerMaxSpeed, leftDot.vx));
            leftDot.x += leftDot.vx * dt;

            // Right Dot Input X
            if (keys.ArrowLeft) {
                rightDot.vx -= config.playerAccel * dt;
            } else if (keys.ArrowRight) {
                rightDot.vx += config.playerAccel * dt;
            } else {
                rightDot.vx *= config.playerFriction;
            }
            rightDot.vx = Math.max(-config.playerMaxSpeed, Math.min(config.playerMaxSpeed, rightDot.vx));
            rightDot.x += rightDot.vx * dt;

            // Canvas element Boundaries
            if (leftDot.x < leftDot.radius) { leftDot.x = leftDot.radius; leftDot.vx = 0; }
            if (leftDot.x > 400 - leftDot.radius) { leftDot.x = 400 - leftDot.radius; leftDot.vx = 0; }

            if (rightDot.x < 400 + rightDot.radius) { rightDot.x = 400 + rightDot.radius; rightDot.vx = 0; }
            if (rightDot.x > 800 - rightDot.radius) { rightDot.x = 800 - rightDot.radius; rightDot.vx = 0; }

            // Collision Bounds (evaluated EXACTLY at the car's Y position = canvas.height/2)
            const tLeft = getTrackTime(leftDot.y, elapsedTime);
            const lxCenter = config.leftTrackBaseX + getLeftTrackOffset(tLeft);
            leftDot.isOutOfBounds = Math.abs(leftDot.x - lxCenter) + leftDot.radius > config.trackWidth / 2;

            const tRight = getTrackTime(rightDot.y, elapsedTime);
            const rxCenter = config.rightTrackBaseX + getRightTrackOffset(tRight);
            rightDot.isOutOfBounds = Math.abs(rightDot.x - rxCenter) + rightDot.radius > config.trackWidth / 2;

            // Accumulate Errors logic (trigger exactly once per breach)
            if (leftDot.isOutOfBounds && !leftDot.wasOutOfBounds) errors++;
            if (rightDot.isOutOfBounds && !rightDot.wasOutOfBounds) errors++;

            leftDot.wasOutOfBounds = leftDot.isOutOfBounds;
            rightDot.wasOutOfBounds = rightDot.isOutOfBounds;

            // Background turns red if any car touches blue area
            isScreenFlashing = leftDot.isOutOfBounds || rightDot.isOutOfBounds;
        }

        function drawFrameStatic() {
            // Just clear and redraw
            drawFrame();
        }

        function drawFrame() {
            // Red flash feedback on error, otherwise dark blue background
            ctx.fillStyle = isScreenFlashing ? '#FF0000' : '#00008B';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Smooth white paths
            drawTrack(config.leftTrackBaseX, getLeftTrackOffset, config.trackWidth);
            drawTrack(config.rightTrackBaseX, getRightTrackOffset, config.trackWidth);

            // Cars
            drawVehicle(leftDot);
            drawVehicle(rightDot);
        }

        function drawTrack(baseX, offsetFunc, baseWidth) {
            ctx.beginPath();
            const ptsLeft = [], ptsRight = [];

            // Track scrolls DOWN, so we generate points from top to bottom
            // Max distance the track will travel over 60s
            const maxScrollDist = 60 * getCurrentScrollSpeed();

            // Render from top (-40) to bottom (height + 40)
            for (let y = -40; y <= canvas.height + 40; y += 10) {
                const trackDist = (y - canvas.height / 2) + elapsedTime * getCurrentScrollSpeed();

                // Finite track limit
                let cappedDist = trackDist;
                if (cappedDist > maxScrollDist) {
                    cappedDist = maxScrollDist;
                } else if (cappedDist < 0) {
                    // Capping before start so the track looks perfectly straight heading "up" into the distance
                    cappedDist = 0;
                }

                const t = cappedDist * 0.005;
                const cx = baseX + offsetFunc(t);

                ptsLeft.push({ x: cx - baseWidth / 2, y: y });
                ptsRight.push({ x: cx + baseWidth / 2, y: y });
            }

            if (ptsLeft.length === 0) return;

            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.moveTo(ptsLeft[0].x, ptsLeft[0].y);
            for (let i = 1; i < ptsLeft.length; i++) ctx.lineTo(ptsLeft[i].x, ptsLeft[i].y);
            for (let i = ptsRight.length - 1; i >= 0; i--) ctx.lineTo(ptsRight[i].x, ptsRight[i].y);
            ctx.closePath();
            ctx.fill();
        }

        function drawVehicle(dot) {
            // Cars are ALWAYS dark metallic grey with black borders to fit requirements
            ctx.fillStyle = '#666666';
            ctx.beginPath();
            ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Initialize start state immediately
        resetSimulation();

    </script>
</body>

</html>
